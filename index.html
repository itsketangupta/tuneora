<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuneora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <script src="script.js" defer></script>
    <link rel="shortcut icon" href="assets/logo.ico" type="image/x-icon">
</head>

<body>
    <div class="website">
        <h1>
            This website is not built for mobile devices. Please use a desktop or laptop to access this website.
        </h1>
        <footer>~By Tuneora <img src="assets/logo.ico" alt="" width="20px"></footer>
    </div>
    <div class="upper_bar">
        <div class="logo"><a href="index.html"><img src="assets/logo.ico" alt="" width="57px"></a></div>
        <h1></h1>
    </div>

    <div class="main_body_container">
        <div class="navbar">
            <div class="buttons_of_navbar">
                <div class="home nav_icon"><button id="home"><img src="assets/home.svg" alt=""></button></div>
                <div class="search nav_icon"><button id="search"><img src="assets/search.svg" alt=""></button></div>
                <div class="libary nav_icon"><button id="libary"><img src="assets/libary.svg" alt=""></button></div>
            </div>
            <div id="active_button"></div>
        </div>

        <div class="center_container">
            <div class="middle_part">
                <h1>Trending Songs</h1>
                <div class="Trending_song">
                    <div id="songs"></div>
                </div>
                <h1>Popular Artists</h1>
                <div class="popular_artist">
                    <div id="artists"></div>
                </div>
            </div>
            <div id="searchbox">
                <div class="input_bar">
                    <input type="text" id="search_input" placeholder="Search for songs, artists, albums...">
                    <button id="searchbox_button"><img src="assets/search.svg" alt=""></button>
                </div>
                <div id="results"></div>
            </div>

            <div id="favorite_songs">
                <h1>Favorite Songs</h1>
                <div id="favorites"></div>
            </div>

            <div class="play_bar">
                <div class="song_id">
                    <div class="song_name"></div>
                    <div class="artist_name"></div>
                </div>
                <div class="middle_part_play_bar">
                    <div class="upper_middle_part_play_bar">
                        <button id="prev"><img src="assets/backword.svg" alt="" width="25px"></button>
                        <button id="play"><img src="assets/playofplaybar.svg" alt="" width="25px"></button>
                        <button id="next"><img src="assets/forword.svg" alt="" width="25px"></button>
                    </div>
                    <div class="lower_middle_part_play_bar">
                        <div class="played_time_of_song">00:00</div>
                        <div class="percentage_bar_of_song"></div>
                        <div class="total_time_of_song">00:00</div>
                    </div>
                </div>
                <div class="sound">
                    <div class="condition_of_sound"><img src="assets/sound.svg" alt=""></div>
                    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
        </div>

        <div class="right_most_part">
            <h1>Recently Played</h1>
            <div id="recent"></div>
        </div>
    </div>
</body>

</html>
